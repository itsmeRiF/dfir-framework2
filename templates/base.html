<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CyberX DFIR v2</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

:root{

    --cx-critical:#dc3545;
    --cx-high:#fd7e14;
    --cx-medium:#ffc107;
    --cx-low:#0dcaf0;
    --cx-info:#6c757d;

    --cx-radius:14px;
    --cx-shadow:0 4px 15px rgba(16,32,64,.08);
    --cx-shadow-lg:0 12px 30px rgba(16,32,64,.14);

}

body{

    background:#f4f7fb;
    font-family:"Segoe UI",sans-serif;
    color:#222;

}

/* Navbar */

.navbar{

    background:white;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    position:sticky;
    top:0;
    z-index:1030;

}

.navbar-brand{

    font-size:24px;
    font-weight:700;

}

.brand-x{

    color:#0d6efd;

}

.nav-link{

    font-weight:500;
    margin-left:8px;
    border-radius:8px;
    transition:.25s;

}

.nav-link:hover{

    background:#e9f2ff;

}

.nav-link.active{

    background:#e9f2ff;
    color:#0d6efd !important;
    font-weight:600;

}

.main-content{

    padding:35px;

}

/* Cards */

.card{

    border:none;
    border-radius:var(--cx-radius);
    box-shadow:var(--cx-shadow);

}

.card-header{

    background:white;
    border-bottom:1px solid #ececec;
    font-weight:600;

}

/* Lift on hover - opt in via .card-hover */

.card-hover{

    transition:transform .22s ease, box-shadow .22s ease;

}

.card-hover:hover{

    transform:translateY(-4px);
    box-shadow:var(--cx-shadow-lg);

}

/* Buttons */

.btn{

    border-radius:8px;

}

/* Severity badges - shared across dashboard, events, timeline */

.sev-badge{

    display:inline-flex;
    align-items:center;
    gap:5px;
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
    text-transform:capitalize;
    border:1px solid transparent;

}

.sev-critical{ background:#fdeaec; color:#a71d2a; border-color:#f5c2c7; }
.sev-high{     background:#fff0e2; color:#8a4b06; border-color:#fed8b1; }
.sev-medium{   background:#fff8e1; color:#8a6d00; border-color:#ffe69c; }
.sev-low{      background:#e3f8fd; color:#08697c; border-color:#b6ecf7; }
.sev-informational{ background:#eef0f2; color:#4d5459; border-color:#dfe3e6; }

/* Table */

.table{

    vertical-align:middle;

}

.table thead{

    background:#f8f9fa;

}

/* Footer */

footer{

    text-align:center;
    padding:25px;
    color:#888;
    font-size:14px;

}

/* Respect reduced-motion preferences */

@media (prefers-reduced-motion:reduce){

    *,*::before,*::after{

        animation-duration:.001ms !important;
        animation-iteration-count:1 !important;
        transition-duration:.001ms !important;

    }

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container-fluid">

<a class="navbar-brand" href="/dashboard">

Cyber<span class="brand-x">X</span> DFIR

</a>

<button class="navbar-toggler"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">

<a class="nav-link {% if request.path.startswith('/dashboard') %}active{% endif %}" href="/dashboard">

<i class="bi bi-speedometer2"></i>

Dashboard

</a>

</li>

<li class="nav-item">

<a class="nav-link {% if request.path.startswith('/cases') %}active{% endif %}" href="/cases">

<i class="bi bi-folder2-open"></i>

Cases

</a>

</li>

<li class="nav-item">

<a class="nav-link" href="/logout">

<i class="bi bi-box-arrow-right"></i>

Logout

</a>

</li>

</ul>

</div>

</div>

</nav>

<div class="container-fluid main-content">

{% block content %}

{% endblock %}

</div>

<footer>

CyberX DFIR v2 • Digital Forensics & Incident Response

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
