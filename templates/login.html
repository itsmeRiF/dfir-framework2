<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberX DFIR | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            background:linear-gradient(135deg,#f3f7fc,#e8eef7);
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        }

        .login-card{
            width:420px;
            background:#fff;
            border:none;
            border-radius:20px;
            padding:40px;
            box-shadow:0 20px 50px rgba(0,0,0,.12);
        }

        .logo{
            width:80px;
            height:80px;
            border-radius:50%;
            background:#2563eb;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:34px;
            font-weight:bold;
            margin:auto;
            margin-bottom:20px;
        }

        h2{
            font-weight:700;
            text-align:center;
            color:#1e293b;
        }

        .subtitle{
            text-align:center;
            color:#64748b;
            margin-bottom:30px;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn-login{
            border-radius:12px;
            padding:12px;
            font-weight:600;
            font-size:16px;
        }

        .footer{
            text-align:center;
            margin-top:25px;
            color:#94a3b8;
            font-size:13px;
        }

        .version{
            text-align:center;
            color:#2563eb;
            font-weight:600;
            margin-bottom:20px;
        }
    </style>

</head>

<body>

<div class="login-card">


    <h2>CyberX DFIR</h2>

    <div class="version">
        Digital Forensics & Incident Response
    </div>

    <p class="subtitle">
        Default user/pass: analyst/analyst123
    </p>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter username"
                required>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter password"
                required>

        </div>

        <div class="d-grid">

            <button
                class="btn btn-primary btn-login"
                type="submit">

                Login

            </button>

        </div>

    </form>

    <div class="footer">

        CyberX DFIR Framework v2.0 (Beta)
        <br>
        Made with ❤️ in India 🇮🇳

    </div>

</div>

</body>
</html>
