{% extends "base.html" %}

{% block content %}

<h2>Upload Evidence - for (<b>Case</b> {{ case_id }})</h2>

<div class="card" style="max-width:640px;margin:20px 0;padding:20px;border:1px solid #ddd;border-radius:8px;">
  <form id="uploadForm" enctype="multipart/form-data">
    <label for="artifact_type"><strong>Artifact Type</strong></label><br>
    <select name="artifact_type" id="artifact_type" style="width:100%;padding:8px;margin:8px 0;">
      {% for key, meta in artifact_types.items() %}
      <option value="{{ key }}">{{ meta.label }}</option>
      {% endfor %}
    </select>

    <label for="file"><strong>Select File</strong></label><br>
    <input type="file" name="file" id="file" required style="margin:8px 0;"><br>

    <button type="submit" style="padding:10px 18px;background:#1a73e8;color:#fff;border:none;border-radius:4px;cursor:pointer;">
      Upload &amp; Analyze
    </button>
  </form>

  <div id="status" style="margin-top:16px;"></div>
</div>

<div style="max-width:640px;">
<script>
document.getElementById("uploadForm").addEventListener("submit", async function (e) {
  e.preventDefault();
  const status = document.getElementById("status");
  status.textContent = "Uploading...";

  const formData = new FormData(this);
  try {
    const res = await fetch("/evidence/upload/{{ case_id }}", {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Upload failed");
    status.innerHTML = `
      <strong style="color:green;">Done</strong><br>
      Type: ${data.artifact_type}<br>
      Events: ${data.events_count}<br>
      Incidents: ${data.incidents_count}
    `;
  } catch (err) {
    status.innerHTML = `<strong style="color:red;">Error:</strong> ${err.message}`;
  }
});
</script>

{% endblock %}
